name: CI Validation

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  validation:
    name: Validation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install Python
        run: uv python install

      - name: Sync dependencies
        run: uv sync --frozen

      - name: Run Ruff linter
        run: uv run ruff check .

      - name: Run Ruff formatter
        run: uv run ruff format . --check

      - name: Run unit tests
        env:
          PYTHONPATH: src
        run: uv run -m unittest discover -v tests/unit

      - name: Run component tests
        env:
          PYTHONPATH: src
        run: uv run -m unittest -v tests.component.test_basic_scenarios