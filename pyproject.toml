[project]
name = "zmena"
version = "0.1.0"
description = "Zmena is a git-native tool"
readme = "README.md"
requires-python = ">=3.14"
dependencies = [
    "ruff>=0.15.5",
]
[tool.ruff]
line-length = 100
[tool.ruff.lint]
select = [
    "B",
    "C4",
    "E",
    "F",
    "I",
    "SIM",
    "UP",
    "W",
]
